<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salsabilah Amin Empires | Online Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --dark: #0f172a; --green: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f1f5f9; color: #333; }
        header { background: var(--dark); color: white; padding: 15px; text-align: center; border-bottom: 3px solid var(--gold); position: sticky; top:0; z-index: 100; }
        .container { max-width: 1000px; margin: 20px auto; padding: 10px; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        
        /* Product Card */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; border-bottom: 3px solid transparent; }
        .card:hover { border-bottom: 3px solid var(--gold); }
        .card img { width: 80px; height: 80px; object-fit: cover; }
        .card h3 { font-size: 1rem; margin: 10px 0; }
        .price { color: var(--green); font-weight: bold; font-size: 1.2rem; }
        .add-btn { background: var(--gold); border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        /* Cart Section */
        .cart-panel { background: white; padding: 20px; border-radius: 10px; height: fit-content; position: sticky; top: 80px; }
        .cart-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; font-size: 0.9rem; }
        .checkout-btn { width: 100%; background: var(--green); color: white; border: none; padding: 15px; border-radius: 5px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        
        .dedication { font-size: 0.8rem; color: #94a3b8; margin-top: 5px; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 1.5rem;">SALSABILAH AMIN EMPIRES</h1>
    <div class="dedication">Dedicated to Natasha & Salsabilah | Justice & Fairness Active</div>
</header>

<div class="container">
    <div>
        <h2 style="font-size: 1.2rem;"><i class="fa fa-th-large"></i> কাস্টমার কালেকশন পোর্টাল</h2>
        <div class="product-grid">
            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/2850/2850742.png" alt="Rice">
                <h3>পাওয়ার চাউল (প্রিমিয়াম)</h3>
                <p class="price">৳ ৭০.০০ /কেজি</p>
                <button class="add-btn" onclick="addToCart('পাওয়ার চাউল', 70)">অ্যাড করুন</button>
            </div>
            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/1261/1261163.png" alt="Oil">
                <h3>সয়াবিন তেল (১ লিটার)</h3>
                <p class="price">৳ ১৬০.০০</p>
                <button class="add-btn" onclick="addToCart('সয়াবিন তেল', 160)">অ্যাড করুন</button>
            </div>
            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/5029/5029253.png" alt="Dal">
                <h3>মসুর ডাল (১ কেজি)</h3>
                <p class="price">৳ ১৩০.০০</p>
                <button class="add-btn" onclick="addToCart('মসুর ডাল', 130)">অ্যাড করুন</button>
            </div>
        </div>
    </div>

    <div class="cart-panel">
        <h3><i class="fa fa-shopping-cart"></i> আপনার কালেকশন</h3>
        <div id="cartItems">
            <p style="color: #999; text-align: center;">কোনো আইটেম নেই</p>
        </div>
        <hr>
        <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem;">
            <span>মোট:</span>
            <span>৳ <span id="total">0</span></span>
        </div>
        <button class="checkout-btn" onclick="checkout()">টাকা কালেকশন করুন</button>
    </div>
</div>

<script>
    let cart = [];
    let total = 0;

    function addToCart(name, price) {
        cart.push({name, price});
        updateCart();
    }

    function updateCart() {
        const cartDiv = document.getElementById('cartItems');
        const totalSpan = document.getElementById('total');
        cartDiv.innerHTML = "";
        total = 0;

        cart.forEach((item, index) => {
            total += item.price;
            cartDiv.innerHTML += `
                <div class="cart-item">
                    <span>${item.name}</span>
                    <span>৳ ${item.price}</span>
                </div>
            `;
        });

        if(cart.length === 0) cartDiv.innerHTML = '<p style="color: #999; text-align: center;">কোনো আইটেম নেই</p>';
        totalSpan.innerText = total;
    }

    function checkout() {
        if(total === 0) {
            alert("আগে আইটেম অ্যাড করুন স্যার!");
            return;
        }
        alert("আলহামদুলিল্লাহ! মোট ৳" + total + " কালেকশন সফল হয়েছে।\n\nসফটওয়্যার আপডেট: ডাটাবেসে সেভ করা হচ্ছে...");
        cart = [];
        updateCart();
    }
</script>

</body>
</html>
